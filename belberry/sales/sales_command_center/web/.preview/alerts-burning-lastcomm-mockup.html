<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Мокап — «Горит»: дата последней коммуникации (3 варианта)</title>
<style>
  :root{
    --bb-violet:#5b50d6; --bb-violet-soft:#f0eefb; --bb-canvas:#faf8f5;
    --bb-ink:#1d1d1f; --bb-muted:#6e6e73; --bb-faint:#9a9aa0; --bb-line:#ece8e3;
    --bb-red:#d4202e; --bb-shadow:0 1px 3px rgba(20,18,50,.06),0 8px 24px -12px rgba(20,18,50,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--bb-canvas);color:var(--bb-ink);-webkit-font-smoothing:antialiased}
  .bb-page{max-width:1080px;margin:0 auto;padding:34px 34px 70px}
  .vlabel{font-size:13px;font-weight:700;color:var(--bb-violet);margin:26px 0 8px;letter-spacing:.01em}
  .vlabel span{color:var(--bb-muted);font-weight:500}
  .bb-card{background:#fff;border:1px solid var(--bb-line);border-radius:18px;padding:20px;box-shadow:var(--bb-shadow)}
  .bb-sect-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .bb-sect-head h2{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .bb-sect-head small{color:var(--bb-faint);font-size:12.5px;font-weight:500;margin-left:auto}
  .bb-sect-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:#fdeced;color:#d4202e;flex:0 0 30px}
  .bb-alert-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bb-line)}
  .bb-alert-row:last-child{border-bottom:0}
  .bb-sev{width:4px;align-self:stretch;border-radius:3px;flex:0 0 4px}
  .bb-sev.critical{background:var(--bb-red)} .bb-sev.warning{background:#e0a44a}
  .bb-alert-title{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;color:var(--bb-ink);text-decoration:none}
  .ext{opacity:.5}
  .bb-alert-meta{font-size:12px;color:var(--bb-faint);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .bb-reason{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;white-space:nowrap;background:#fdf2e7;color:#b5651d}
  .bb-reason.critical{background:#fdeced;color:var(--bb-red)}
  .tabular{font-variant-numeric:tabular-nums}
  .amount{font-weight:700;font-size:14px}
  .nomove{font-size:12px;font-weight:600}
  .right{text-align:right;flex:0 0 auto;min-width:130px}

  /* В1 — отдельная колонка по центру */
  .comm{flex:0 0 auto;width:200px;text-align:center;font-size:12px;line-height:1.35}
  .comm .lbl{color:var(--bb-faint);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
  .comm .val{color:var(--bb-muted);font-weight:600;font-variant-numeric:tabular-nums}
  .comm .ago{color:var(--bb-faint);font-size:11px}
  .comm .none{color:#b5651d;font-weight:600}

  /* В2 — чип в строке мета */
  .commchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--bb-muted);background:var(--bb-canvas);border:1px solid var(--bb-line);border-radius:999px;padding:2px 8px;font-variant-numeric:tabular-nums}
  .commchip.none{color:#b5651d;border-color:#f0d9bf;background:#fdf6ee}
  .commchip svg{width:12px;height:12px;opacity:.7}

  /* В3 — в правом блоке, отдельной строкой под суммой */
  .right .commline{font-size:11.5px;color:var(--bb-faint);font-weight:600;font-variant-numeric:tabular-nums;margin-top:3px;display:inline-flex;align-items:center;gap:4px;justify-content:flex-end}
  .right .commline svg{width:12px;height:12px;opacity:.7}
  .right .commline.none{color:#b5651d}
</style>
</head>
<body>
<div class="bb-page">

  <div class="vlabel">Вариант 1 — отдельная колонка по центру <span>(дата + «N дн. назад», самое заметное)</span></div>
  <div class="bb-card" id="v1"></div>

  <div class="vlabel">Вариант 2 — чип в строке под названием <span>(компактно, рядом с причиной; средняя зона пустая)</span></div>
  <div class="bb-card" id="v2"></div>

  <div class="vlabel">Вариант 3 — в правом блоке под суммой <span>(вместе с «дн. без движения», ничего не двигаем влево)</span></div>
  <div class="bb-card" id="v3"></div>

</div>

<script>
const EXT='<svg class="ext" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
const FLAME='<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>';
const CLOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
const SNAP='2026-06-17';

const ROWS=[
  {dom:'sporttravma.org', meta:'Подготовка КП · Деговцова Елизавета', reason:'критический возраст', sev:'critical', amount:'259 тыс ₽', nomove:42, comm:'2026-05-06'},
  {dom:'zn48.ru', meta:'Подготовка КП · Деговцова Елизавета', reason:'критический возраст', sev:'critical', amount:'81 тыс ₽', nomove:31, comm:'2026-05-17'},
  {dom:'galaktika.clinic', meta:'Подготовка КП · Семенихин Егор', reason:'застряла 22 дн.', sev:'critical', amount:'828 тыс ₽', nomove:22, comm:'2026-05-26'},
  {dom:'renewal.ru', meta:'Догрев и переговоры · Деговцова Елизавета', reason:'застряла 27 дн.', sev:'warning', amount:'125 тыс ₽', nomove:27, comm:'2026-05-21'},
  {dom:'geots.ru', meta:'Подготовка договора · Деговцова Елизавета', reason:'застряла 25 дн.', sev:'warning', amount:'163 тыс ₽', nomove:25, comm:'2026-05-23'},
  {dom:'smclinic.ru', meta:'Подготовка договора · Деговцова Елизавета', reason:'застряла 22 дн.', sev:'warning', amount:'85 тыс ₽', nomove:22, comm:null},
  {dom:'panaceadoc.ru', meta:'Догрев и переговоры · Гордиенко Евгения', reason:'нет бюджета', sev:'warning', amount:'0 ₽', nomove:22, comm:'2026-05-30'},
];
const fmt=d=>{const[y,m,dd]=d.split('-');return `${dd}.${m}.${y}`};
const fmtShort=d=>{const[y,m,dd]=d.split('-');return `${dd}.${m}`};
const ago=d=>Math.floor((new Date(SNAP)-new Date(d))/86400000);

const head='<div class="bb-sect-head"><span class="bb-sect-ic">'+FLAME+'</span><h2>Горит</h2><small>застрявшие сделки · топ-12</small></div>';
const titleBlock=r=>`<div style="min-width:0;flex:1"><a class="bb-alert-title" href="#">${r.dom} ${EXT}</a><p class="bb-alert-meta">${r.meta}<span class="bb-reason ${r.sev==='critical'?'critical':''}">${r.reason}</span>__CHIP__</p></div>`;
const rightBlock=(r,extra='')=>`<div class="right"><p class="tabular amount">${r.amount}</p><p class="nomove" style="color:${r.sev==='critical'?'#d4202e':'#b5651d'}">${r.nomove} дн. без движения</p>${extra}</div>`;

// Вариант 1
document.getElementById('v1').innerHTML=head+'<ul style="list-style:none">'+ROWS.map(r=>{
  const comm=r.comm
    ? `<div class="comm"><div class="lbl">последний контакт</div><div class="val">${fmt(r.comm)}</div><div class="ago">${ago(r.comm)} дн. назад</div></div>`
    : `<div class="comm"><div class="lbl">последний контакт</div><div class="none">контакта не было</div></div>`;
  return `<li class="bb-alert-row"><span class="bb-sev ${r.sev}"></span>${titleBlock(r).replace('__CHIP__','')}${comm}${rightBlock(r)}</li>`;
}).join('')+'</ul>';

// Вариант 2
document.getElementById('v2').innerHTML=head+'<ul style="list-style:none">'+ROWS.map(r=>{
  const chip=r.comm
    ? ` <span class="commchip">${CLOCK} контакт ${fmtShort(r.comm)} · ${ago(r.comm)} дн.</span>`
    : ` <span class="commchip none">${CLOCK} контакта не было</span>`;
  return `<li class="bb-alert-row"><span class="bb-sev ${r.sev}"></span>${titleBlock(r).replace('__CHIP__',chip)}${rightBlock(r)}</li>`;
}).join('')+'</ul>';

// Вариант 3
document.getElementById('v3').innerHTML=head+'<ul style="list-style:none">'+ROWS.map(r=>{
  const line=r.comm
    ? `<p class="commline">${CLOCK} контакт ${fmt(r.comm)}</p>`
    : `<p class="commline none">${CLOCK} контакта не было</p>`;
  return `<li class="bb-alert-row"><span class="bb-sev ${r.sev}"></span>${titleBlock(r).replace('__CHIP__','')}${rightBlock(r,line)}</li>`;
}).join('')+'</ul>';
</script>
</body>
</html>
