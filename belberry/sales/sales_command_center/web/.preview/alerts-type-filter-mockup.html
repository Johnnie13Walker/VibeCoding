<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Мокап — фильтр задач по типу + менеджеру</title>
<style>
  :root{
    --bb-violet:#5b50d6; --bb-violet-soft:#f0eefb; --bb-canvas:#faf8f5;
    --bb-ink:#1d1d1f; --bb-muted:#6e6e73; --bb-faint:#9a9aa0; --bb-line:#ece8e3;
    --bb-red:#d4202e;
    --bb-shadow:0 1px 3px rgba(20,18,50,.06),0 8px 24px -12px rgba(20,18,50,.12);
    --bb-shadow-lift:0 1px 3px rgba(20,18,50,.06),0 16px 34px -16px rgba(43,42,94,.4);
    --bb-green:#1a7f37; --bb-green-soft:#e6f4ea;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--bb-canvas);color:var(--bb-ink);-webkit-font-smoothing:antialiased}
  .bb-page{max-width:1080px;margin:0 auto;padding:34px 34px 70px}
  .note{font-size:13px;color:var(--bb-muted);background:#fff;border:1px solid var(--bb-line);border-radius:12px;padding:12px 16px;margin-bottom:18px}
  .note b{color:var(--bb-ink)}
  .bb-card{background:#fff;border:1px solid var(--bb-line);border-radius:18px;padding:20px;box-shadow:var(--bb-shadow)}
  .bb-sect-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .bb-sect-head h2{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .bb-sect-head small{color:var(--bb-faint);font-size:12.5px;font-weight:500;margin-left:auto}
  .bb-sect-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:#fdf2e7;color:#b5651d;flex:0 0 30px}
  .pickers{display:flex;gap:8px;flex:0 0 auto}
  .bb-alert-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bb-line)}
  .bb-alert-row:last-child{border-bottom:0}
  .bb-alert-title{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;color:var(--bb-ink);text-decoration:none}
  .bb-alert-title:hover{color:var(--bb-violet)}
  .bb-alert-meta{font-size:12px;color:var(--bb-faint);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .bb-alert-meta a{color:var(--bb-violet);text-decoration:none}
  .bb-reason{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;white-space:nowrap}
  .r-overdue{background:#fdeced;color:var(--bb-red)}
  .r-control{background:var(--bb-green-soft);color:var(--bb-green)}
  .r-await{background:var(--bb-violet-soft);color:var(--bb-violet)}
  .dl{font-size:12px;margin-top:4px;color:var(--bb-faint)}
  .dl.over{color:var(--bb-red)}
  .empty{color:var(--bb-muted);font-size:14px;padding:8px 0}

  /* picker */
  .pk{position:relative}
  .pk-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--bb-line);background:#fff;border-radius:11px;padding:8px 12px;font:inherit;font-size:13px;font-weight:600;color:var(--bb-ink);cursor:pointer}
  .pk-btn svg{width:15px;height:15px}
  .pk-chev{color:var(--bb-faint);transition:transform .15s}
  .pk.open .pk-chev{transform:rotate(180deg)}
  .pk-pop{position:absolute;top:calc(100% + 6px);right:0;z-index:20;width:260px;background:#fff;border:1px solid var(--bb-line);border-radius:14px;box-shadow:var(--bb-shadow-lift);padding:8px;display:none}
  .pk.open .pk-pop{display:block}
  .pk-actions{display:flex;gap:6px;padding:4px 6px 8px;border-bottom:1px solid var(--bb-line);margin-bottom:6px}
  .pk-actions button{flex:1;border:1px solid var(--bb-line);background:var(--bb-canvas);border-radius:8px;padding:5px 8px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .pk-all{color:var(--bb-violet)} .pk-none{color:var(--bb-muted)}
  .pk-opt{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:10px;border:0;background:transparent;font:inherit;font-size:13.5px;color:var(--bb-ink);cursor:pointer;text-align:left}
  .pk-opt.on{background:var(--bb-violet-soft)}
  .pk-box{width:18px;height:18px;flex:0 0 18px;border-radius:6px;display:grid;place-items:center;border:1.5px solid var(--bb-line);background:#fff}
  .pk-opt.on .pk-box{border:0;background:var(--bb-violet)}
  .pk-box svg{width:13px;height:13px;display:none}.pk-opt.on .pk-box svg{display:block}
  .pk-dot{width:9px;height:9px;border-radius:999px;flex:0 0 9px}
</style>
</head>
<body>
<div class="bb-page">
  <div class="note">
    <b>Мокап</b> — секция «Задачи на контроле» с двумя независимыми мультивыборами: <b>тип</b> (в просрочке / на контроле / ждёт выполнения) и <b>менеджер</b>.
    Выбор внутри фильтра — ИЛИ (любой из отмеченных), между фильтрами — И. По умолчанию выбрано всё. Данные демонстрационные.
  </div>

  <div class="bb-card">
    <div class="bb-sect-head">
      <span class="bb-sect-ic">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </span>
      <h2>Задачи на контроле</h2>
      <small id="count">из разбора встреч · 7</small>
      <div class="pickers">
        <div class="pk" id="pk-type"></div>
        <div class="pk" id="pk-mgr"></div>
      </div>
    </div>
    <ul id="list" style="list-style:none"></ul>
  </div>
</div>

<script>
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_FILTER = '<svg viewBox="0 0 24 24" fill="none" stroke="#5b50d6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>';
const ICON_USERS = '<svg viewBox="0 0 24 24" fill="none" stroke="#5b50d6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
const CHEV = '<svg class="pk-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

// Демоданные. type: overdue | control | await
const MANAGERS = [
  {id:1, name:'Гордиенко Евгения'},
  {id:2, name:'Деговцова Елизавета'},
  {id:3, name:'Семенихин Егор'},
];
const TYPES = [
  {id:'overdue', name:'В просрочке',     dot:'#d4202e', cls:'r-overdue', label:'просрочена'},
  {id:'control', name:'На контроле',     dot:'#1a7f37', cls:'r-control', label:'на контроле'},
  {id:'await',   name:'Ждёт выполнения', dot:'#5b50d6', cls:'r-await',   label:'ждёт выполнения'},
];
const TASKS = [
  {title:'altamedplus.ru: Получить от клиента вопросы/обратную связь по смете, отчёту AI, позициям и упоминаниям бренда', mgr:2, type:'overdue', dl:'09.06, 15:00'},
  {title:'medcel.ru: Провести созвон с собственниками по финальным цифрам КП', mgr:1, type:'overdue', dl:'12.06, 15:00'},
  {title:'pedklin.ru: Оценить рынок и прогнозные значения по нейрохирургии для Директа', mgr:1, type:'control', dl:'15.06, 15:00'},
  {title:'maxtreat.ru: Обсудить со специалистами и вернуться к клиенту с предложением', mgr:3, type:'control', dl:'16.06, 15:00'},
  {title:'delficlinic.ru: Провести созвон 24 июня по предложению по рекламе и репутации', mgr:3, type:'await', dl:'24.06, 15:00'},
  {title:'emk24.ru: Отправить клиенту бриф/вопросы для подготовки предложения', mgr:2, type:'await', dl:'18.06, 15:00'},
  {title:'reclinic.ru: Провести SEO-аудит по стоматологии и подготовить выводы', mgr:2, type:'await', dl:'21.06, 15:00'},
];

const selType = new Set(TYPES.map(t=>t.id));
const selMgr  = new Set(MANAGERS.map(m=>m.id));

function buildPicker(el, items, sel, {icon, allWord, withDot}){
  function label(){
    const n=sel.size, all=items.length;
    return n===0 ? `${allWord==='типы'?'Тип не выбран':'Никто не выбран'}` : n===all ? `Все ${allWord} (${all})` : `Выбрано: ${n} из ${all}`;
  }
  function render(){
    el.innerHTML =
      `<button class="pk-btn" type="button">${icon}<span class="pk-lbl">${label()}</span>${CHEV}</button>
       <div class="pk-pop">
         <div class="pk-actions"><button class="pk-all" type="button">Выбрать все</button><button class="pk-none" type="button">Снять всё</button></div>
         ${items.map(it=>`<button class="pk-opt ${sel.has(it.id)?'on':''}" data-id="${it.id}" type="button">
            <span class="pk-box">${CHECK}</span>
            ${withDot?`<span class="pk-dot" style="background:${it.dot}"></span>`:''}
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.name}</span>
          </button>`).join('')}
       </div>`;
    el.querySelector('.pk-btn').onclick=()=>{document.querySelectorAll('.pk').forEach(p=>{if(p!==el)p.classList.remove('open')});el.classList.toggle('open')};
    el.querySelector('.pk-all').onclick=()=>{items.forEach(it=>sel.add(it.id));render();apply()};
    el.querySelector('.pk-none').onclick=()=>{sel.clear();render();apply()};
    el.querySelectorAll('.pk-opt').forEach(b=>b.onclick=()=>{const id=isNaN(+b.dataset.id)?b.dataset.id:+b.dataset.id;sel.has(id)?sel.delete(id):sel.add(id);render();apply();el.classList.add('open')});
  }
  render();
  return render;
}

function apply(){
  const rows = TASKS.filter(t=>selType.has(t.type) && selMgr.has(t.mgr));
  const list = document.getElementById('list');
  document.getElementById('count').textContent = `из разбора встреч · ${rows.length}`;
  if(rows.length===0){ list.innerHTML = `<li class="empty">Под фильтр ничего не подходит.</li>`; return; }
  list.innerHTML = rows.map(t=>{
    const ty = TYPES.find(x=>x.id===t.type);
    const mgr = MANAGERS.find(m=>m.id===t.mgr).name;
    return `<li class="bb-alert-row">
      <div style="min-width:0;flex:1">
        <a class="bb-alert-title" href="#">${t.title}
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <p class="bb-alert-meta">${mgr} · <a href="#">сделка</a></p>
      </div>
      <div style="text-align:right;flex:0 0 auto">
        <span class="bb-reason ${ty.cls}">${ty.label}</span>
        <p class="dl ${t.type==='overdue'?'over':''}">дедлайн: ${t.dl}</p>
      </div>
    </li>`;
  }).join('');
}

buildPicker(document.getElementById('pk-type'), TYPES, selType, {icon:ICON_FILTER, allWord:'типы', withDot:true});
buildPicker(document.getElementById('pk-mgr'), MANAGERS, selMgr, {icon:ICON_USERS, allWord:'менеджеры', withDot:false});
document.addEventListener('mousedown', e=>{ if(!e.target.closest('.pk')) document.querySelectorAll('.pk').forEach(p=>p.classList.remove('open')); });
apply();
</script>
</body>
</html>
